<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الوصول الآمن | جامعة المستقبل</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        #particles-js { position: fixed; width: 100%; height: 100%; background: #0f172a; z-index: -1; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .wrapper { width: 420px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 20px; padding: 40px; color: #fff; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .input-box { position: relative; width: 100%; height: 50px; margin: 20px 0; }
        .input-box input { width: 100%; height: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: #fff; padding: 0 45px 0 20px; font-size: 16px; outline: none; transition: 0.3s; }
        .input-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #4cc9f0; }
        .btn { width: 100%; height: 50px; background: #4361ee; border: none; border-radius: 12px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: #4cc9f0; transform: translateY(-2px); }
        #otpSection, #newPassSection { display: none; }
        .loading { display: none; margin-top: 10px; color: #4cc9f0; font-size: 14px; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="wrapper">
    <img src="https://uomus.edu.iq/img/logo.png" style="width: 80px; margin-bottom: 10px;">
    
    <div id="loginSection">
        <h1>دخول الإدارة</h1>
        <form id="loginForm">
            <div class="input-box"><input type="text" id="username" placeholder="اسم المستخدم" required><i class='bx bxs-user-badge'></i></div>
            <div class="input-box"><input type="password" id="password" placeholder="كلمة المرور" required><i class='bx bxs-lock-alt'></i></div>
            <button type="submit" class="btn">تسجيل الدخول</button>
            <p style="margin-top: 15px;"><a href="#" onclick="showReset()" style="color: #4cc9f0; text-decoration: none; font-size: 13px;">نسيت كلمة السر؟ استعادة عبر الهاتف</a></p>
        </form>
    </div>

    <div id="otpSection">
        <h2>تحقق SMS</h2>
        <div class="input-box"><input type="tel" id="phoneReset" placeholder="077XXXXXXXX"><i class='bx bxs-phone-call'></i></div>
        <button class="btn" id="sendBtn" onclick="sendOTPReal()">إرسال الرمز للهاتف</button>
        <div id="loadingMsg" class="loading"><i class='bx bx-loader-alt bx-spin'></i> جاري الاتصال بـ Twilio...</div>
        
        <div id="otpInputArea" style="display: none; margin-top: 20px;">
            <input type="text" id="otpCode" placeholder="الرمز" maxlength="4" style="width: 120px; text-align: center; padding: 10px; border-radius: 10px; border: none; font-size: 22px; color: #1a1a2e; font-weight: bold;">
            <button class="btn" style="margin-top: 15px; background: #06d6a0;" onclick="verifyOTP()">تأكيد الرمز</button>
        </div>
    </div>

    <div id="newPassSection">
        <h2>كلمة سر جديدة</h2>
        <div class="input-box"><input type="password" id="newPass" placeholder="كلمة السر الجديدة"><i class='bx bxs-key'></i></div>
        <button class="btn" onclick="updatePasswordInDB()">حفظ في السيرفر</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // إعدادات مشروعك الحقيقي (hakthin-c6812)
    const firebaseConfig = { 
        apiKey: "AIzaSyDj_p6Aqo7FuqEurK-yL7LFIUATA4-cG8I", 
        authDomain: "hakthin-c6812.firebaseapp.com", 
        databaseURL: "https://hakthin-c6812-default-rtdb.firebaseio.com/", 
        projectId: "hakthin-c6812", 
        appId: "1:208156149096:web:1c2676ed0eb66b8cc502dd" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    particlesJS("particles-js", {"particles":{"number":{"value":50},"color":{"value":"#4cc9f0"},"line_linked":{"opacity":0.2},"move":{"speed":1}}});

    // تسجيل الدخول - تم ربطه بكلمة السر في Firebase (ppooiiuu078)
    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // جلب كلمة السر من عقدة adminSetting كما في صورتك
        db.ref('adminSetting').once('value', (snap) => {
            const data = snap.val();
            if(user === "admin" && pass === data.password) {
                sessionStorage.setItem("isLoggedIn", "true");
                window.location.href = "admin.html";
            } else {
                alert("خطأ! تأكد من اسم المستخدم أو كلمة السر.");
            }
        });
    };

    function showReset() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('otpSection').style.display = 'block';
    }

    // إرسال SMS باستخدام Twilio وبياناتك
    async function sendOTPReal() {
        const phone = document.getElementById('phoneReset').value;
        const loader = document.getElementById('loadingMsg');
        
        const accountSid = 'ACd086c08e69d12da4d1c05986c56642e1'; 
        const authToken = '7963a050d51560c84fde65733a55be2f';
        const messagingServiceSid = 'MG663e918266f389acf8089c5d3077f987';

        db.ref('adminSetting').once('value', async (snap) => {
            if(phone !== snap.val().phone) return alert("الرقم غير موثق!");

            loader.style.display = 'block';
            const generatedOTP = Math.floor(1000 + Math.random() * 9000);
            sessionStorage.setItem('temp_otp', generatedOTP);

            let formattedPhone = phone;
            if(phone.startsWith('0')) formattedPhone = '+964' + phone.substring(1);

            try {
                const response = await fetch(`https://api.twilio.com/2010-04-01/Accounts/${accountSid}/Messages.json`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(`${accountSid}:${authToken}`),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        'To': formattedPhone,
                        'MessagingServiceSid': messagingServiceSid,
                        'Body': `رمز التحقق لجامعة المستقبل: ${generatedOTP}`
                    })
                });

                if(response.ok) {
                    loader.style.display = 'none';
                    alert("تم إرسال SMS بنجاح!");
                    document.getElementById('otpInputArea').style.display = 'block';
                }
            } catch (err) {
                alert("فشل الاتصال بمزود الخدمة!");
                loader.style.display = 'none';
            }
        });
    }

    function verifyOTP() {
        if(document.getElementById('otpCode').value == sessionStorage.getItem('temp_otp')) {
            document.getElementById('otpSection').style.display = 'none';
            document.getElementById('newPassSection').style.display = 'block';
        } else { alert("الرمز خطأ!"); }
    }

    function updatePasswordInDB() {
        const newP = document.getElementById('newPass').value;
        db.ref('adminSetting').update({ password: newP }).then(() => {
            alert("تم التحديث! يمكنك الآن الدخول بكلمة السر الجديدة.");
            location.reload();
        });
    }
</script>
</body>
</html>
