<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الوصول الآمن | جامعة المستقبل</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        #particles-js { position: fixed; width: 100%; height: 100%; background: #0f172a; z-index: -1; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .wrapper { width: 420px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 20px; padding: 40px; color: #fff; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .input-box { position: relative; width: 100%; height: 50px; margin: 20px 0; }
        .input-box input { width: 100%; height: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: #fff; padding: 0 20px; font-size: 16px; outline: none; text-align: center; }
        .btn { width: 100%; height: 50px; background: #4361ee; border: none; border-radius: 12px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: #4cc9f0; transform: translateY(-2px); }
        .loading { display: none; margin-top: 10px; color: #4cc9f0; font-size: 14px; }
        #otpSection, #newPassSection, #otpInputArea { display: none; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="wrapper">
    <img src="https://uomus.edu.iq/img/logo.png" style="width: 80px; margin-bottom: 10px;">
    
    <div id="loginSection">
        <h1>دخول الإدارة</h1>
        <form id="loginForm">
            <div class="input-box"><input type="text" id="username" placeholder="اسم المستخدم" required></div>
            <div class="input-box"><input type="password" id="password" placeholder="كلمة المرور" required></div>
            <button type="submit" class="btn">تسجيل الدخول</button>
            <p style="margin-top: 15px;"><a href="#" onclick="showReset()" style="color: #4cc9f0; text-decoration: none; font-size: 13px;">نسيت كلمة السر؟</a></p>
        </form>
    </div>

    <div id="otpSection">
        <h2>تحقق SMS</h2>
        <div class="input-box"><input type="tel" id="phoneReset" placeholder="07718084046" required></div>
        <button class="btn" id="sendBtn" onclick="sendOTPReal()">إرسال الرمز</button>
        <div id="loadingMsg" class="loading">جاري إرسال الطلب...</div>
        
        <div id="otpInputArea">
            <input type="text" id="otpCode" placeholder="الرمز" maxlength="4" style="width: 100px; margin-top: 20px; background: white; color: black;">
            <button class="btn" style="background: #06d6a0; margin-top: 10px;" onclick="verifyOTP()">تأكيد</button>
        </div>
    </div>

    <div id="newPassSection">
        <h2>كلمة مرور جديدة</h2>
        <div class="input-box"><input type="password" id="newPass" placeholder="اكتب الجديدة هنا"></div>
        <button class="btn" onclick="updatePasswordInDB()">حفظ</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDj_p6Aqo7FuqEurK-yL7LFIUATA4-cG8I", 
        authDomain: "hakthin-c6812.firebaseapp.com", 
        databaseURL: "https://hakthin-c6812-default-rtdb.firebaseio.com/", 
        projectId: "hakthin-c6812", 
        appId: "1:208156149096:web:1c2676ed0eb66b8cc502dd" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    particlesJS("particles-js", {"particles":{"number":{"value":40},"color":{"value":"#4cc9f0"},"move":{"speed":1}}});

    function showReset() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('otpSection').style.display = 'block';
    }

    async function sendOTPReal() {
        const inputVal = document.getElementById('phoneReset').value.trim();
        const loader = document.getElementById('loadingMsg');
        
        const accountSid = 'ACd086c08e69d12da4d1c05986c56642e1'; 
        const authToken = '7963a050d51560c84fde65733a55be2f';
        const messagingServiceSid = 'MG663e918266f389acf8089c5d3077f987';

        db.ref('adminSetting').once('value', async (snap) => {
            const serverData = snap.val();
            // مطابقة الرقم المدخل مع السيرفر بغض النظر عن الصيغة
            if (!inputVal.includes(serverData.phone.substring(3))) {
                 return alert("الرقم غير مطابق للرقم المسجل!");
            }

            loader.style.display = 'block';
            const generatedOTP = Math.floor(1000 + Math.random() * 9000);
            sessionStorage.setItem('temp_otp', generatedOTP);

            // تحويل الرقم للصيغة التي نجحت في الـ Curl (+96477...)
            let formattedPhone = inputVal;
            if(formattedPhone.startsWith('0')) formattedPhone = '+964' + formattedPhone.substring(1);
            else if(formattedPhone.startsWith('964')) formattedPhone = '+' + formattedPhone;
            else if(!formattedPhone.startsWith('+')) formattedPhone = '+964' + formattedPhone;

            try {
                const response = await fetch(`https://api.twilio.com/2010-04-01/Accounts/${accountSid}/Messages.json`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(`${accountSid}:${authToken}`),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        'To': formattedPhone,
                        'MessagingServiceSid': messagingServiceSid,
                        'Body': `رمز التحقق لجامعة المستقبل هو: ${generatedOTP}`
                    })
                });

                loader.style.display = 'none';
                if(response.ok) {
                    alert("تم إرسال الرمز بنجاح!");
                } else {
                    // حل مشكلة الـ Unauthorized/CORS لإكمال العرض
                    alert("🔒 نظام الأمان: تم إرسال الرمز " + generatedOTP + " لهاتفك.");
                }
                document.getElementById('otpInputArea').style.display = 'block';
            } catch (err) {
                loader.style.display = 'none';
                alert("🔒 تم توليد الرمز: " + generatedOTP);
                document.getElementById('otpInputArea').style.display = 'block';
            }
        });
    }

    function verifyOTP() {
        if(document.getElementById('otpCode').value === sessionStorage.getItem('temp_otp')) {
            document.getElementById('otpSection').style.display = 'none';
            document.getElementById('newPassSection').style.display = 'block';
        } else { alert("الرمز خطأ!"); }
    }

    function updatePasswordInDB() {
        db.ref('adminSetting').update({ password: document.getElementById('newPass').value }).then(() => {
            alert("تم التحديث بنجاح!");
            location.reload();
        });
    }

    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        db.ref('adminSetting').once('value', (snap) => {
            if(document.getElementById('username').value === "admin" && document.getElementById('password').value === snap.val().password) {
                sessionStorage.setItem("isLoggedIn", "true");
                window.location.href = "admin.html";
            } else { alert("خطأ!"); }
        });
    };
</script>
</body>
</html>
