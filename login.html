<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة | جامعة المستقبل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; 
            --primary: #4361ee; --success: #06d6a0; --danger: #ef233c; 
            --border: #e4e6eb; --accent: #4cc9f0;
        }
        .dark-mode { 
            --bg: #18191a; --card: #242526; --text: #e4e6eb; 
            --primary: #4cc9f0; --border: #3e4042; 
        }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 1200px; margin: auto; }

        /* Header */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--card); padding: 20px; border-radius: 20px; 
            margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            text-align: center; border-bottom: 5px solid var(--primary); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .stat-card h3 { font-size: 32px; margin: 10px 0; color: var(--primary); }

        /* News Management */
        .news-manager { 
            background: var(--card); border-radius: 20px; padding: 25px; 
            margin-bottom: 25px; border-top: 5px solid var(--success);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .news-input-group { display: flex; gap: 10px; margin-top: 15px; }
        input[type="text"] { 
            flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); outline: none;
        }

        /* Table Area */
        .table-card { 
            background: var(--card); border-radius: 20px; padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; 
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid var(--border); text-align: right; }
        th { background: var(--bg); color: var(--primary); }

        /* Buttons */
        .btn { 
            border: none; padding: 8px 16px; border-radius: 8px; 
            cursor: pointer; font-weight: bold; transition: 0.2s; color: white;
        }
        .btn-call { background: var(--success); }
        .btn-done { background: var(--primary); }
        .btn-del { background: #607d8b; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        .urgent-tag { 
            background: var(--danger); color: white; padding: 2px 8px; 
            border-radius: 5px; font-size: 11px; margin-right: 5px;
        }
    </style>
</head>
<body>

<script>
    // نظام الحماية: يمنع الدخول بدون تسجيل أو عند التحديث
    if (sessionStorage.getItem("isLoggedIn") !== "true") {
        window.location.href = "login.html";
    }
    // مسح الجلسة لضمان طلب التسجيل عند التحديث (حسب طلبك)
    window.onbeforeunload = function() {
        sessionStorage.removeItem("isLoggedIn");
    };
</script>

<div class="container">
    <div class="header">
        <div>
            <img src="https://uomus.edu.iq/img/logo.png" style="height: 40px; vertical-align: middle;">
            <h2 style="display: inline; margin-right: 10px;">لوحة إدارة المراجعين</h2>
        </div>
        <div>
            <button onclick="exportToExcel()" class="btn" style="background: #27ae60;"><i class="fas fa-file-excel"></i> تقرير Excel</button>
            <button onclick="document.body.classList.toggle('dark-mode')" class="btn" style="background: var(--text); color: var(--bg);"><i class="fas fa-moon"></i></button>
            <button onclick="sessionStorage.removeItem('isLoggedIn'); location.href='login.html'" class="btn" style="background: var(--danger);"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>

    <div class="news-manager">
        <h3><i class="fas fa-bullhorn"></i> شريط الأخبار الحية للطالب</h3>
        <div class="news-input-group">
            <input type="text" id="newsInput" placeholder="اكتب خبراً ليظهر فوراً في هواتف الطلاب...">
            <button onclick="publishNews()" class="btn btn-call">نشر الآن</button>
        </div>
        <div id="activeNews" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3 id="statTotal">0</h3><p>إجمالي الحجوزات</p></div>
        <div class="stat-card" style="border-color: var(--danger);"><h3 id="statUrgent" style="color: var(--danger);">0</h3><p>حالات مستعجلة</p></div>
        <div class="stat-card" style="border-color: var(--success);"><h3 id="statDone" style="color: var(--success);">0</h3><p>تم إنجازها</p></div>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>تذكرة</th>
                    <th>اسم الطالب</th>
                    <th>رقم الهاتف</th>
                    <th>نوع المعاملة</th>
                    <th>الحالة</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDj_p6Aqo7FuqEurK-yL7LFIUATA4-cG8I", 
        authDomain: "hakthin-c6812.firebaseapp.com", 
        databaseURL: "https://hakthin-c6812-default-rtdb.firebaseio.com/", 
        projectId: "hakthin-c6812", 
        appId: "1:208156149096:web:1c2676ed0eb66b8cc502dd" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // دالة نشر الأخبار
    function publishNews() {
        const text = document.getElementById('newsInput').value;
        if(text) {
            db.ref('news/').push({ text: text });
            document.getElementById('newsInput').value = "";
        }
    }

    // عرض وحذف الأخبار
    db.ref('news/').on('value', snap => {
        const list = document.getElementById('activeNews');
        list.innerHTML = "";
        snap.forEach(child => {
            list.innerHTML += `
                <div style="background:var(--bg); padding:8px 15px; border-radius:30px; border:1px solid var(--primary); font-size:13px;">
                    ${child.val().text} 
                    <i class="fas fa-times-circle" style="color:var(--danger); cursor:pointer; margin-right:8px;" onclick="db.ref('news/${child.key}').remove()"></i>
                </div>`;
        });
    });

    // إدارة جدول المراجعين
    db.ref('queue/').on('value', (snap) => {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        let total = 0, urgent = 0, done = 0;

        snap.forEach(child => {
            const d = child.val();
            const k = child.key;
            total++;
            if(d.priority === 'مستعجلة') urgent++;
            if(d.status === 'تم الإنجاز') done++;

            tbody.innerHTML += `
                <tr style="${d.priority === 'مستعجلة' ? 'background: rgba(239, 35, 60, 0.05);' : ''}">
                    <td><span style="font-weight:bold; color:var(--primary);">#${d.ticket}</span></td>
                    <td>${d.name} ${d.priority === 'مستعجلة' ? '<span class="urgent-tag">مستعجل</span>' : ''}</td>
                    <td><a href="tel:${d.phone}" style="text-decoration:none; color:inherit;">${d.phone}</a></td>
                    <td>${d.reason}</td>
                    <td><small>${d.status}</small></td>
                    <td>
                        <button class="btn btn-call" onclick="updateStatus('${k}', 'حان دورك')">نداء</button>
                        <button class="btn btn-done" onclick="updateStatus('${k}', 'تم الإنجاز')">إنجاز</button>
                        <button class="btn btn-del" onclick="db.ref('queue/${k}').remove()"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
        });

        document.getElementById('statTotal').innerText = total;
        document.getElementById('statUrgent').innerText = urgent;
        document.getElementById('statDone').innerText = done;
    });

    function updateStatus(key, newStatus) {
        db.ref('queue/' + key).update({ status: newStatus });
    }

    function exportToExcel() {
        const table = document.getElementById("adminTable");
        const html = table ? table.outerHTML : "<table>" + document.getElementById("tableBody").parentNode.innerHTML + "</table>";
        const url = 'data:application/vnd.ms-excel,' + encodeURIComponent(html);
        const link = document.createElement("a");
        link.download = "تقرير_مراجعين_المستقبل.xls";
        link.href = url;
        link.click();
    }
</script>
</body>
</html>
