<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الوصول الآمن | جامعة المستقبل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .reset-card { max-width: 450px; margin: 100px auto; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #004a99; border: none; }
        .loading-spinner { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card reset-card p-4">
        <h3 class="text-center mb-4">استعادة كلمة المرور</h3>
        
        <div id="step1">
            <div class="mb-3">
                <label class="form-label">رقم الهاتف المسجل</label>
                <input type="text" id="phoneReset" class="form-control" placeholder="077XXXXXXXX" required>
            </div>
            <button onclick="sendOTPReal()" class="btn btn-primary w-100">
                إرسال الرمز عبر WhatsApp 
                <span id="loadingMsg" class="spinner-border spinner-border-sm loading-spinner"></span>
            </button>
        </div>

        <div id="otpInputArea" style="display: none;" class="mt-4">
            <hr>
            <div class="mb-3">
                <label class="form-label">أدخل الرمز الواصل للواتساب</label>
                <input type="number" id="otpInput" class="form-control" placeholder="****">
            </div>
            <div class="mb-3">
                <label class="form-label">كلمة المرور الجديدة</label>
                <input type="password" id="newPasswordInput" class="form-control" placeholder="أدخل 6 رموز على الأقل">
            </div>
            <button onclick="verifyAndResetPassword()" class="btn btn-success w-100">تحديث كلمة المرور</button>
        </div>
    </div>
</div>

<script>
    // 1. إعدادات Firebase - استبدلها ببيانات مشروعك الحقيقية
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. إعدادات Twilio (من صورك الحقيقية)
    const twilio = {
        sid: 'ACd086c08e69d12da4d1c05986c56642e1',
        token: '9f1e170206febab17f57db00b6557d0b',
        from: 'whatsapp:+14155238886'
    };

    // 3. دالة إرسال الرمز
    async function sendOTPReal() {
        const phoneInput = document.getElementById('phoneReset').value.trim();
        const loader = document.getElementById('loadingMsg');

        db.ref('adminSetting').once('value', async (snap) => {
            const data = snap.val();
            if (!data || phoneInput !== data.phone) {
                alert("⚠️ الرقم غير مطابق لبيانات المسؤول!");
                return;
            }

            loader.style.display = 'inline-block';
            const generatedOTP = Math.floor(1000 + Math.random() * 9000);
            sessionStorage.setItem('temp_otp', generatedOTP);

            let formattedPhone = phoneInput.startsWith('0') ? '+964' + phoneInput.substring(1) : phoneInput;

            try {
                const response = await fetch(`https://api.twilio.com/2010-04-01/Accounts/${twilio.sid}/Messages.json`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(`${twilio.sid}:${twilio.token}`),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        'To': `whatsapp:${formattedPhone}`,
                        'From': twilio.from,
                        'Body': `*جامعة المستقبل*\n\nرمز التحقق الخاص بك هو: [ ${generatedOTP} ]`
                    })
                });

                loader.style.display = 'none';
                if(response.ok) {
                    alert("✅ أرسلنا الرمز لواتسابك.");
                    document.getElementById('otpInputArea').style.display = 'block';
                } else {
                    alert("⚠️ ملاحظة: الرمز للعرض هو " + generatedOTP);
                    document.getElementById('otpInputArea').style.display = 'block';
                }
            } catch (e) {
                loader.style.display = 'none';
                alert("🔒 الرمز (Demo): " + generatedOTP);
                document.getElementById('otpInputArea').style.display = 'block';
            }
        });
    }

    // 4. دالة التحقق والتحديث
    function verifyAndResetPassword() {
        const userOTP = document.getElementById('otpInput').value;
        const savedOTP = sessionStorage.getItem('temp_otp');
        const newPass = document.getElementById('newPasswordInput').value;

        if (userOTP === savedOTP && newPass.length >= 6) {
            db.ref('adminSetting').update({ password: newPass })
            .then(() => {
                alert("🎉 تم تغيير كلمة المرور بنجاح!");
                location.reload();
            });
        } else {
            alert("❌ الرمز خطأ أو الباسورد قصير جداً!");
        }
    }
</script>

</body>
</html>
