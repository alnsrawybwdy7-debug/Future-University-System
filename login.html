<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الإدارة | جامعة المستقبل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body {
            background: #0f172a; /* لون داكن احترافي */
            background-image: radial-gradient(circle at 20% 30%, rgba(37, 99, 235, 0.2) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(29, 78, 216, 0.15) 0%, transparent 40%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* تصميم الكارت مشابه للصورة التي أرفقتها */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            color: white;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .university-logo {
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 50%;
            padding: 5px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .university-logo img { width: 100%; height: auto; }

        h3 { font-weight: 700; letter-spacing: -0.5px; margin-bottom: 30px; }

        .form-control {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.3);
            background: #ffffff;
        }

        .btn-login {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
            color: white;
        }

        .forgot-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 20px;
            transition: color 0.2s;
        }

        .forgot-link:hover { color: #60a5fa; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="university-logo">
        <img src="https://uomus.edu.iq/img/logo.png" alt="Logo"> 
    </div>
    <h3>دخول الإدارة</h3>
    
    <div class="mb-2">
        <input type="text" id="adminPhone" class="form-control" placeholder="رقم الهاتف (077XXXXXXXX)">
    </div>
    <div class="mb-4">
        <input type="password" id="adminPassword" class="form-control" placeholder="كلمة المرور">
    </div>
    
    <button onclick="login()" class="btn btn-login shadow-lg">تسجيل الدخول</button>
    
    <br>
    <a href="reset.html" class="forgot-link">نسيت كلمة السر؟</a>
</div>

<script>
    // --- ربط Firebase (ضع بياناتك هنا) ---
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "your-app.firebaseapp.com",
        databaseURL: "https://your-app-default-rtdb.firebaseio.com",
        projectId: "your-app",
        storageBucket: "your-app.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // دالة تسجيل الدخول
    function login() {
        const phone = document.getElementById('adminPhone').value.trim();
        const pass = document.getElementById('adminPassword').value.trim();

        if(!phone || !pass) {
            alert("⚠️ يرجى إدخال رقم الهاتف وكلمة المرور");
            return;
        }

        // التحقق من قاعدة البيانات
        db.ref('adminSetting').once('value', (snap) => {
            const data = snap.val();
            
            if (data && phone === data.phone && pass === data.password) {
                alert("✅ أهلاً بك! تم تسجيل الدخول بنجاح.");
                // هنا تضع رابط صفحة لوحة التحكم الخاصة بك
                window.location.href = "dashboard.html"; 
            } else {
                alert("❌ عذراً، رقم الهاتف أو كلمة المرور غير صحيحة!");
            }
        });
    }
</script>

</body>
</html>
