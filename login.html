<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الإدارة | جامعة المستقبل</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body {
            background: #0f172a;
            background-image: radial-gradient(circle at 20% 30%, rgba(37, 99, 235, 0.2) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(29, 78, 216, 0.15) 0%, transparent 40%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            color: white;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .university-logo {
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 50%;
            padding: 5px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .university-logo img { width: 100%; height: auto; }

        h3 { font-weight: 700; margin-bottom: 30px; color: #fff; }

        .form-control {
            background: rgba(255, 255, 255, 0.9) !important;
            border: none;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1rem;
            color: #000;
        }

        .btn-login {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px rgba(37, 99, 235, 0.4);
            color: white;
        }

        .forgot-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 20px;
        }

        .forgot-link:hover { color: #60a5fa; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="university-logo">
        <img src="https://uomus.edu.iq/img/logo.png" alt="Logo"> 
    </div>
    <h3>دخول الإدارة</h3>
    
    <div class="mb-2">
        <input type="text" id="adminPhone" class="form-control" placeholder="رقم الهاتف (077XXXXXXXX)">
    </div>
    <div class="mb-4">
        <input type="password" id="adminPassword" class="form-control" placeholder="كلمة المرور">
    </div>
    
    <button onclick="login()" class="btn btn-login shadow-lg">تسجيل الدخول</button>
    
    <br>
    <a href="reset.html" class="forgot-link">نسيت كلمة السر؟</a>
</div>

<script>
    // --- 1. إعدادات Firebase الحقيقية ---
    // الصق بياناتك هنا ليعمل الربط
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "your-project.firebaseapp.com",
        databaseURL: "https://your-project-default-rtdb.firebaseio.com",
        projectId: "your-project",
        storageBucket: "your-project.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    
    // تهيئة الفايربيس
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // --- 2. دالة تسجيل الدخول ---
    function login() {
        const phoneInput = document.getElementById('adminPhone').value.trim();
        const passInput = document.getElementById('adminPassword').value.trim();

        if(!phoneInput || !passInput) {
            alert("⚠️ يرجى ملء رقم الهاتف وكلمة المرور");
            return;
        }

        // جلب البيانات من Firebase فرع adminSetting
        db.ref('adminSetting').once('value').then((snap) => {
            const data = snap.val();
            
            if (data && phoneInput === data.phone && passInput === data.password) {
                alert("✅ تم تسجيل الدخول بنجاح!");
                // الانتقال لصفحتك المسماة admin.html
                window.location.href = "admin.html"; 
            } else {
                alert("❌ فشل الدخول: الرقم أو الباسورد غير صحيح");
            }
        }).catch((error) => {
            console.error(error);
            alert("حدث خطأ في الاتصال بقاعدة البيانات: " + error.message);
        });
    }
</script>

</body>
</html>
