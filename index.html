<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الطالب | جامعة المستقبل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #4cc9f0;
            --danger: #ef233c;
            --success: #06d6a0;
            --bg-color: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* الشعار المتحرك في الخلفية */
        .background-logo {
            position: absolute;
            z-index: -1;
            width: 400px;
            opacity: 0.1; /* شفافية عالية ليكون خلفية */
            animation: logoFloat 10s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.05; }
            50% { transform: scale(1.2) rotate(10deg); opacity: 0.15; }
        }

        /* زر وضع الليل */
        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--primary);
            z-index: 10001;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* شاشة الترحيب */
        #welcomeOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .start-btn {
            padding: 15px 40px;
            background: white;
            color: var(--primary);
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* بطاقة الحجز الزجاجية */
        .container {
            width: 100%;
            max-width: 430px;
            padding: 20px;
            z-index: 10;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            text-align: center;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #444;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 42px;
            color: var(--primary);
            z-index: 5;
        }

        input, select {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border-radius: 12px;
            border: 1.5px solid #ddd;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: #fff;
        }

        /* الأولوية */
        .priority-options {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .prio-item { flex: 1; }
        .prio-item input { display: none; }
        .prio-label {
            display: block;
            padding: 12px;
            background: #fff;
            border: 1.5px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        #p-normal:checked + .prio-label { background: var(--primary); color: white; }
        #p-urgent:checked + .prio-label { background: var(--danger); color: white; }

        .btn-main {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.2);
        }

        /* التذكرة والنجاح */
        #ticketOverlay, #doneOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .ticket, .done-card {
            background: white;
            width: 85%;
            max-width: 350px;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }

        .ticket-num { font-size: 70px; font-weight: 900; color: var(--primary); margin: 10px 0; }
        .stars { font-size: 30px; color: #ddd; cursor: pointer; margin: 15px 0; }
        .stars i.active { color: #f1c40f; }
    </style>
</head>

<body>

    <img src="https://future.uomus.edu.iq/img/logo.png" class="background-logo" alt="لوجو جامعة المستقبل">

    <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>

    <div id="welcomeOverlay">
        <img src="https://future.uomus.edu.iq/img/logo.png" width="120" style="margin-bottom: 20px; filter: brightness(0) invert(1);">
        <h1>جامعة المستقبل</h1>
        <p>نظام المراجعة الإلكتروني الذكي</p>
        <button class="start-btn" onclick="activateSystem()">دخول الموقع</button>
    </div>

    <div class="container">
        <div class="main-card">
            <h2 style="margin-bottom: 25px; color: var(--primary);">حجز تذكرة دور</h2>

            <div class="input-group">
                <label>الاسم الثلاثي</label>
                <i class="fas fa-user"></i>
                <input type="text" id="name" placeholder="أدخل اسمك فقط" oninput="this.value = this.value.replace(/[0-9]/g, '')">
            </div>

            <div class="input-group">
                <label>الرقم الجامعي</label>
                <i class="fas fa-hashtag"></i>
                <input type="text" id="stuID" placeholder="أرقام فقط" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>

            <div class="input-group">
                <label>رقم الهاتف</label>
                <i class="fas fa-phone"></i>
                <input type="tel" id="phone" placeholder="07XXXXXXXXX" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>

            <div class="input-group">
                <label>نوع المعاملة</label>
                <i class="fas fa-info-circle" style="top: 42px;"></i>
                <select id="reason">
                    <option value="">-- اختر السبب --</option>
                    <option value="استلام هوية">استلام هوية جامعية</option>
                    <option value="تأييد استمرار">تأييد استمرار بالدراسة</option>
                    <option value="وثيقة تخرج">طلب وثيقة تخرج</option>
                    <option value="تسديد أجور">تسديد أجور دراسية</option>
                    <option value="براءة ذمة">إجراء براءة ذمة</option>
                </select>
            </div>

            <div class="input-group">
                <label>الأولوية</label>
                <div class="priority-options">
                    <div class="prio-item">
                        <input type="radio" name="prio" id="p-normal" value="عادية" checked>
                        <label for="p-normal" class="prio-label">عادية</label>
                    </div>
                    <div class="prio-item">
                        <input type="radio" name="prio" id="p-urgent" value="مستعجلة">
                        <label for="p-urgent" class="prio-label" style="color: #d90429;">مستعجلة 🔥</label>
                    </div>
                </div>
            </div>

            <button class="btn-main" onclick="confirmBooking()">تأكيد الحجز الآن</button>
        </div>
    </div>

    <div id="ticketOverlay">
        <div class="ticket">
            <p>رقم تذكرتك هو</p>
            <div class="ticket-num" id="tValue">---</div>
            <div id="statusBadge" style="color:orange; font-weight:bold;">انتظر دورك...</div>
        </div>
    </div>

    <div id="doneOverlay">
        <div class="done-card">
            <i class="fas fa-check-circle" style="font-size: 60px; color: var(--success);"></i>
            <h2>تم الإنجاز!</h2>
            <p>قيم تجربتك</p>
            <div class="stars" id="starRating">
                <i class="fas fa-star" onclick="rate(1)"></i>
                <i class="fas fa-star" onclick="rate(2)"></i>
                <i class="fas fa-star" onclick="rate(3)"></i>
                <i class="fas fa-star" onclick="rate(4)"></i>
                <i class="fas fa-star" onclick="rate(5)"></i>
            </div>
            <button class="btn-main" onclick="location.reload()">خروج</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDj_p6Aqo7FuqEurK-yL7LFIUATA4-cG8I",
            authDomain: "hakthin-c6812.firebaseapp.com",
            databaseURL: "https://hakthin-c6812-default-rtdb.firebaseio.com/",
            projectId: "hakthin-c6812",
            appId: "1:208156149096:web:1c2676ed0eb66b8cc502dd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const sound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        function toggleTheme() { document.body.style.filter = document.body.style.filter === 'invert(1)' ? 'invert(0)' : 'invert(1)'; }
        function activateSystem() { sound.play().then(() => { sound.pause(); document.getElementById('welcomeOverlay').style.display = 'none'; }); }

        function confirmBooking() {
            const name = document.getElementById('name').value;
            const sid = document.getElementById('stuID').value;
            const phone = document.getElementById('phone').value;
            const reason = document.getElementById('reason').value;
            const priority = document.querySelector('input[name="prio"]:checked').value;

            if (!name || !sid || !phone || !reason) return alert("أكمل جميع الحقول");
            if (phone.length < 11) return alert("رقم الهاتف يجب أن يكون 11 رقم");

            const ticket = Math.floor(100 + Math.random() * 899);
            const ref = db.ref('queue/').push();

            ref.set({ name, sid, phone, reason, ticket, priority, status: 'انتظار' });

            document.getElementById('tValue').innerText = ticket;
            document.getElementById('ticketOverlay').style.display = 'flex';

            ref.on('value', (snap) => {
                if (!snap.val()) return;
                if (snap.val().status === 'حان دورك') {
                    sound.play();
                    document.getElementById('statusBadge').innerText = "🔔 حان دورك الآن!";
                    document.getElementById('statusBadge').style.color = "var(--success)";
                }
                if (snap.val().status === 'تم الإنجاز') {
                    document.getElementById('ticketOverlay').style.display = 'none';
                    document.getElementById('doneOverlay').style.display = 'flex';
                }
            });
        }

        function rate(n) {
            const stars = document.querySelectorAll('#starRating i');
            stars.forEach((s, i) => s.classList.toggle('active', i < n));
        }
    </script>
</body>
</html>
